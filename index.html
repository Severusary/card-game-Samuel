<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>限定抽卡课堂互动</title>
  <style>
    :root {
      --bg1: #0f1226;
      --bg2: #1a1f45;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.14);
      --text: #f7f8ff;
      --muted: #b9bfdc;
      --accent: #ffd76a;
      --accent2: #8fd3ff;
      --danger: #ff7c7c;
      --success: #7dffb3;
      --shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #252e68 0%, var(--bg2) 32%, var(--bg1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .header {
      padding: 22px 18px 14px;
      background: linear-gradient(135deg, rgba(255,215,106,0.18), rgba(143,211,255,0.12));
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,215,106,0.18);
      color: #ffeaa8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .section {
      padding: 16px 18px;
    }

    .hero {
      border-radius: 20px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }

    .hero-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #fff2b5;
    }

    .hero-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .stat {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
    }

    .notice {
      margin-top: 14px;
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255,124,124,0.10);
      border: 1px solid rgba(255,124,124,0.18);
      font-size: 13px;
      line-height: 1.6;
      color: #ffd4d4;
    }

    .result-box {
      margin-top: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 18px;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .result-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .result-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    .result-fail { color: #ffd2d2; }
    .result-ssr { color: #fff1a3; }
    .result-sr { color: #bce8ff; }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:active { transform: scale(0.98); }
    button[disabled] { opacity: 0.55; cursor: not-allowed; }

    .primary {
      background: linear-gradient(135deg, #ffe07c, #ffc54a);
      color: #332200;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .ghost {
      width: 100%;
      margin-top: 10px;
      background: transparent;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.12);
    }

    .history {
      margin-top: 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 14px;
    }

    .history h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .history ul {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 132px;
      overflow: auto;
    }

    .history li {
      font-size: 13px;
      line-height: 1.6;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .history li:last-child { border-bottom: none; }

    .footer-tip {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .config {
      margin-top: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .config summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .config summary::-webkit-details-marker { display: none; }

    .config-body {
      padding: 0 14px 14px;
      display: grid;
      gap: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--text);
    }

    .toggle-row span small {
      display: block;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
      transition: .2s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: white;
      transition: .2s;
    }

    .switch input:checked + .slider {
      background: rgba(255,215,106,0.5);
    }

    .switch input:checked + .slider:before {
      transform: translateX(22px);
    }

    @media (max-width: 380px) {
      .buttons { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="tag">课堂互动</div>
      <h1>限定卡池返场，错过再等一年</h1>
      <div class="subtitle">
        模拟游戏“限定卡池”抽卡场景，体验限定、倒计时、保底进度与“再来一次”的心理拉扯。
      </div>
    </div>

    <div class="section">
      <div class="hero">
        <div class="hero-title">限定 SSR 皮肤返场</div>
        <div class="hero-desc">
          错过今日，再等一年。<br>
          首抽免费，再抽一次需消耗 <b>6 钻石</b>。<br>
          SSR 概率 <b>1%</b>，10 抽保底。
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">剩余时间</div>
            <div class="stat-value" id="countdown">00:20</div>
          </div>
          <div class="stat">
            <div class="stat-label">保底进度</div>
            <div class="stat-value" id="pity">0 / 10</div>
          </div>
          <div class="stat">
            <div class="stat-label">累计抽数</div>
            <div class="stat-value" id="drawCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">累计消耗</div>
            <div class="stat-value" id="costCount">0</div>
          </div>
        </div>

        <div class="result-box" id="resultBox">
          <div class="result-title">准备开始抽卡</div>
          <div class="result-desc">
            首抽免费。台上同学可先点一次，再决定要不要继续。<br>
            真正想考验人的，不是“抽一次”，而是“没中之后，还要不要再来一次”。
          </div>
        </div>

        <div class="buttons">
          <button class="primary" id="drawBtn">首抽免费</button>
          <button class="secondary" id="continueBtn" disabled>再抽一次（6 钻石）</button>
        </div>
        <button class="ghost" id="resetBtn">重新开始</button>

        <details class="config">
          <summary>课堂设置</summary>
          <div class="config-body">
            <div class="toggle-row">
              <span>
                演示模式
                <small>开启后前两抽固定失败，第三抽起恢复正常概率；适合课堂控场。</small>
              </span>
              <label class="switch">
                <input type="checkbox" id="demoMode" checked>
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </details>

        <div class="history">
          <h3>抽卡记录</h3>
          <ul id="historyList">
            <li>尚未开始抽卡。</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    const drawBtn = document.getElementById('drawBtn');
    const continueBtn = document.getElementById('continueBtn');
    const resetBtn = document.getElementById('resetBtn');
    const demoMode = document.getElementById('demoMode');

    const countdownEl = document.getElementById('countdown');
    const pityEl = document.getElementById('pity');
    const drawCountEl = document.getElementById('drawCount');
    const costCountEl = document.getElementById('costCount');
    const resultBox = document.getElementById('resultBox');
    const historyList = document.getElementById('historyList');

    let remaining = 20;
    let drawCount = 0;
    let pity = 0;
    let cost = 0;
    let timer = null;
    let ended = false;

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateStats() {
      countdownEl.textContent = `00:${pad(remaining)}`;
      pityEl.textContent = `${pity} / 10`;
      drawCountEl.textContent = drawCount;
      costCountEl.textContent = `${cost} 钻石`;
    }

    function setResult(title, desc, className = '') {
      resultBox.innerHTML = `
        <div class="result-title ${className}">${title}</div>
        <div class="result-desc">${desc}</div>
      `;
    }

    function addHistory(text) {
      const li = document.createElement('li');
      li.textContent = text;
      if (historyList.children.length === 1 && historyList.children[0].textContent === '尚未开始抽卡。') {
        historyList.innerHTML = '';
      }
      historyList.prepend(li);
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => {
        if (remaining > 0) {
          remaining -= 1;
          updateStats();
        } else {
          endPool();
        }
      }, 1000);
    }

    function endPool() {
      ended = true;
      clearInterval(timer);
      drawBtn.disabled = true;
      continueBtn.disabled = true;
      setResult(
        '活动已结束',
        '倒计时归零。很多时候，真正推动继续消费的，不是“需要”，而是“怕错过”。',
        'result-fail'
      );
      addHistory('倒计时结束，限定卡池关闭。');
    }

    function getOutcome() {
      if (pity >= 9) {
        return 'SSR';
      }

      if (demoMode.checked && drawCount < 2) {
        return 'R';
      }

      const roll = Math.random();
      if (roll < 0.01) return 'SSR';
      if (roll < 0.10) return 'SR';
      return 'R';
    }

    function handleDraw(isFree = false) {
      if (ended) return;
      if (!timer) startTimer();

      if (!isFree) cost += 6;

      const outcome = getOutcome();
      drawCount += 1;
      pity += 1;

      if (outcome === 'SSR') {
        setResult(
          '恭喜获得限定 SSR 皮肤！',
          `第 ${drawCount} 抽终于抽中了。现在你可以问台下：如果前面已经投入了这么多，“喜悦”里是否也夹杂着被机制牵着走的感觉？`,
          'result-ssr'
        );
        addHistory(`第 ${drawCount} 抽：SSR 限定皮肤。`);
        pity = 0;
        continueBtn.disabled = true;
        drawBtn.disabled = true;
        clearInterval(timer);
        ended = true;
      } else if (outcome === 'SR') {
        setResult(
          '抽中了 SR 稀有奖励',
          '虽然不是限定 SSR，但已经有一点“离目标更近了”的感觉。很多继续投入，正是从这种“差一点”开始的。',
          'result-sr'
        );
        addHistory(`第 ${drawCount} 抽：SR 稀有奖励。`);
        continueBtn.disabled = false;
        drawBtn.disabled = true;
      } else {
        setResult(
          '很遗憾，未获得限定皮肤',
          '你获得了普通奖励 ×1。现在最想追问的问题不是“中没中”，而是：你会不会因为已经抽过一次，而更想再来一次？',
          'result-fail'
        );
        addHistory(`第 ${drawCount} 抽：普通奖励。`);
        continueBtn.disabled = false;
        drawBtn.disabled = true;
      }

      updateStats();
    }

    function resetAll() {
      clearInterval(timer);
      timer = null;
      remaining = 20;
      drawCount = 0;
      pity = 0;
      cost = 0;
      ended = false;
      drawBtn.disabled = false;
      continueBtn.disabled = true;
      historyList.innerHTML = '<li>尚未开始抽卡。</li>';
      setResult(
        '准备开始抽卡',
        '首抽免费。台上同学可先点一次，再决定要不要继续。<br>真正想考验人的，不是“抽一次”，而是“没中之后，还要不要再来一次”。'
      );
      updateStats();
    }

    drawBtn.addEventListener('click', () => handleDraw(true));
    continueBtn.addEventListener('click', () => handleDraw(false));
    resetBtn.addEventListener('click', resetAll);
    demoMode.addEventListener('change', resetAll);

    updateStats();
  </script>
</body>
</html>
